<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect reduces DNS+TCP latency; preload fetches stylesheet early  -->
    <!-- This prevents FOUT that would cause SplitText to measure wrong char widths  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    />

    <!-- Project Title -->
    <title>Ravius</title>
    <meta name="description" content="Plataforma moderna para escalar seu negócio digital." />
    <meta name="author" content="Samuel" />

    <!-- Open Graph Metadata -->
    <meta property="og:title" content="Ravius" />
    <meta property="og:description" content="Plataforma moderna para escalar seu negócio digital." />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Metadata -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
